<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reconnaissance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f4f9;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input[type="text"] {
            padding: 8px;
            width: 250px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Internet domains reconnaissance</h2>

    <!-- Prikaz greške (ako je došlo do greške pri prethodnoj pretrazi) -->
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form action="/search" method="POST">
        <label for="domain">Target domain:</label><br><br>
        <input type="text" id="domain" name="domain" placeholder="ex. google.com" required><br><br><br>

        <label for="keyword">Search by keyword (if no keyword whole output be printed):</label><br><br>
        <input type="text" id="keyword" name="keyword" placeholder="ex. registrar"><br><br>

        <button type="submit">Search</button>
    </form>
</div>

</body>
</html>
